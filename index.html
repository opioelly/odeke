
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Search Tool</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  gap:10px;
  padding:15px;
  background:#020617;
  position:sticky;
  top:0;
}

.topbar h2{
  margin:0;
  color:#38bdf8;
  font-size:18px;
}

.topbar input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

.topbar button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
  padding:15px;
}

/* PLAYER */
iframe{
  width:100%;
  height:420px;
  border:none;
  border-radius:10px;
  background:black;
}

/* RESULTS */
.grid{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:80vh;
  overflow-y:auto;
}

.video-card{
  display:flex;
  gap:10px;
  background:#1e293b;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.video-card:hover{
  background:#334155;
}

.video-card img{
  width:120px;
  border-radius:6px;
}

.video-card p{
  font-size:13px;
  margin:0;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>▶ Video Search</h2>
  <input id="searchInput" placeholder="Search videos...">
  <button onclick="searchVideos()">Search</button>
</div>

<div class="layout">
  <iframe id="player"></iframe>
  <div id="results" class="grid"></div>
</div>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY";

let nextPageToken = "";
let currentQuery = "";
let loading = false;

const results = document.getElementById("results");
const player = document.getElementById("player");

/* SEARCH */
async function searchVideos(reset = true){

  const q = document.getElementById("searchInput").value;

  if(!q && reset) return alert("Type something");

  if(reset){
    results.innerHTML = "";
    nextPageToken = "";
    currentQuery = q;
  }

  loading = true;

  try{

    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${encodeURIComponent(currentQuery)}&pageToken=${nextPageToken}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    nextPageToken = data.nextPageToken || "";

    if(data.items){
      renderVideos(data.items);
    }

    if(reset && data.items && data.items[0]){
      playVideo(data.items[0].id.videoId);
    }

  }catch(err){
    console.log(err);
    results.innerHTML = "Error loading videos";
  }

  loading = false;
}

/* RENDER */
function renderVideos(items){
  items.forEach(item=>{
    if(!item.id.videoId) return;

    const div = document.createElement("div");
    div.className = "video-card";

    div.innerHTML = `
      <img src="${item.snippet.thumbnails.medium.url}">
      <p>${item.snippet.title}</p>
    `;

    div.onclick = () => playVideo(item.id.videoId);

    results.appendChild(div);
  });
}

/* PLAY VIDEO */
function playVideo(id){
  player.src = `https://www.youtube-nocookie.com/embed/${id}`;
}

/* INFINITE SCROLL */
window.addEventListener("scroll", ()=>{

  const nearBottom =
    window.innerHeight + window.scrollY >= document.body.offsetHeight - 200;

  if(nearBottom && !loading && nextPageToken){
    searchVideos(false);
  }
});

</script>

</body>
</html>
