
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODEKE AMENJILDO MUSIC SITE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
  background:linear-gradient(135deg,#0f172a,#020617);
}

.hero h1{
  font-size:32px;
  margin-bottom:10px;
  color:#38bdf8;
  letter-spacing:2px;
}

.hero p{
  color:#94a3b8;
  max-width:500px;
  margin:0 auto 20px auto;
}

.hero button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.hero button:hover{
  transform:scale(1.05);
}

/* HEADER */
.header{
  display:flex;
  gap:10px;
  padding:15px;
  background:#020617;
  align-items:center;
  position:sticky;
  top:0;
}

.header h2{
  margin:0;
  font-size:16px;
  color:#38bdf8;
}

.header input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

.header button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  color:#020617;
  font-weight:bold;
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
  padding:15px;
}

/* PLAYER */
iframe{
  width:100%;
  height:420px;
  border:none;
  border-radius:10px;
  background:black;
}

/* LIST */
.list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:80vh;
  overflow-y:auto;
}

.card{
  display:flex;
  gap:10px;
  background:#1e293b;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  background:#334155;
}

.card img{
  width:120px;
  border-radius:6px;
}

.card p{
  font-size:13px;
  margin:0;
}
</style>
</head>

<body>

<!-- HERO SECTION -->
<div class="hero">
  <h1>ODEKE AMENJILDO</h1>
  <p>Your personal music discovery platform — search, play, and enjoy music instantly.</p>
  <button onclick="document.getElementById('searchInput').focus()">
    Start Listening
  </button>
</div>

<!-- HEADER -->
<div class="header">
  <h2>🎵 ODEKE MUSIC SITE</h2>
  <input id="searchInput" placeholder="Search music...">
  <button onclick="searchMusic()">Search</button>
</div>

<!-- MAIN -->
<div class="container">
  <iframe id="player"></iframe>
  <div id="results" class="list"></div>
</div>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY";

/* SEARCH MUSIC */
async function searchMusic(){

  const q = document.getElementById("searchInput").value;
  const results = document.getElementById("results");
  const player = document.getElementById("player");

  if(!q) return alert("Type a song name");

  results.innerHTML = "Loading...";

  try{
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${encodeURIComponent(q)} music&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    results.innerHTML = "";

    data.items.forEach(item=>{
      const videoId = item.id.videoId;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${item.snippet.thumbnails.medium.url}">
        <p>${item.snippet.title}</p>
      `;

      div.onclick = () => {
        player.src = `https://www.youtube-nocookie.com/embed/${videoId}`;
      };

      results.appendChild(div);
    });

    if(data.items[0]){
      player.src = `https://www.youtube-nocookie.com/embed/${data.items[0].id.videoId}`;
    }

  }catch(err){
    console.log(err);
    results.innerHTML = "Error loading music";
  }
}
</script>

</body>
</html>
