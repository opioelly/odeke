


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amenjildo Music Site</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

    body{
      background:#0b1220;
      color:#e2e8f0;
      padding:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    h1{margin-bottom:10px;}

    input, textarea{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:5px;
      border:none;
      outline:none;
    }

    button{
      margin-top:10px;
      padding:10px 15px;
      border:none;
      border-radius:5px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    iframe{
      width:100%;
      height:350px;
      margin-top:15px;
      border:none;
      border-radius:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:10px;
      margin-top:15px;
    }

    .video-card{
      background:#0f172a;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .video-card img{width:100%;}

    .video-card p{
      font-size:12px;
      padding:8px;
      color:#cbd5e1;
    }

    audio{width:100%;margin-top:10px;}

    .whatsapp{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      width:60px;
      height:60px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:28px;
      text-decoration:none;
      color:white;
    }
  </style>
</head>

<body>

<h1>🎵 Amenjildo Music Platform</h1>

<div class="card">
  <h2>🔎 Search Music Videos</h2>
  <input id="searchInput" placeholder="Search songs or artists..." />
  <button onclick="searchMusic()">Search</button>

  <iframe id="player" allowfullscreen></iframe>
  <div id="results" class="grid"></div>
</div>

<div class="card">
  <h2>🎧 Audio Player</h2>

  <h3>Track 1</h3>
  <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <h3>Track 2</h3>
  <audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
</div>

<div class="card">
  <h2>📞 Contact</h2>
  <a href="https://wa.me/256769576137" target="_blank"><button>WhatsApp Me</button></a>

  <input id="name" placeholder="Name" />
  <input id="email" placeholder="Email" />
  <textarea id="message" placeholder="Message"></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<a class="whatsapp" href="https://wa.me/256769576137">💬</a>

<script>
const API_KEY = "AIzaSyAqLUTZgNiGt_r2m4i9eH9TwXfp2TwQZAA";

function searchMusic(){
  const q=document.getElementById('searchInput').value;
  const results=document.getElementById('results');
  const player=document.getElementById('player');

  if(!q){alert('Type something');return;}

  // fallback ALWAYS works (no API dependency)
  const url=`https://www.youtube-nocookie.com/embed?listType=search&list=${encodeURIComponent(q)}`;
  player.src=url;

  results.innerHTML=`<p style="color:#cbd5e1">Playing results for: ${q}</p>`;
}

function sendMessage(){
 const n=document.getElementById('name').value;
 const e=document.getElementById('email').value;
 const m=document.getElementById('message').value;

 if(!n||!e||!m){alert('Fill all fields');return;}

 window.location.href=`mailto:your@email.com?subject=Message from ${n}&body=${m}`;
}
</script>

</body>
</html>
